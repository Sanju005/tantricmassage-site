  <title>Private Gallery | Kuala Lumpur</title>
  <link rel="preload" href="/styles/tailwind.css" as="style">
  <link rel="stylesheet" href="/styles/tailwind.css">
  <style>
    :root {
      --bg-main: #0B0B0B;
      --bg-secondary: #1A1A1A;
      --gold-main: #D4AF37;
      --gold-soft: #FFD700;
      --text-main: #FFFFFF;
      --text-secondary: #CCCCCC;
      --accent-pink: #C94F8A;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(201, 79, 138, 0.08), transparent 26%),
        linear-gradient(180deg, #121212 0%, var(--bg-main) 46%, #0a0710 100%);
      color: var(--text-main);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .app-frame {
      width: 100%;
      max-width: 34rem;
      margin: 0 auto;
      padding: 1rem 0.75rem 5rem;
    }

    .gallery-card {
      border-radius: 1.8rem;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      box-shadow:
        inset 0 0 0 1px rgba(212, 175, 55, 0.14),
        0 18px 34px rgba(0, 0, 0, 0.3);
    }

    .gallery-shot {
      aspect-ratio: 4 / 5;
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
  <main class="app-frame">
    <section class="px-4 py-8 text-center">
      <p class="text-xs uppercase tracking-[0.4em]" style="color: var(--gold-main);">Private Gallery</p>
      <h1 class="mt-4 text-4xl font-semibold leading-tight">Curated premium gallery</h1>
      <p class="mx-auto mt-4 max-w-[30ch] text-sm leading-7" style="color: var(--text-secondary);">A private preview page for adult visitors who confirmed they are above 18.</p>
    </section>

    <section class="mt-4 grid grid-cols-2 gap-4 px-4">
      <article class="gallery-card">
        <div class="gallery-shot" style="background-image: url('https://images.unsplash.com/photo-1515377905703-c4788e51af15?auto=format&fit=crop&w=900&q=80');"></div>
      </article>
      <article class="gallery-card">
        <div class="gallery-shot" style="background-image: url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?auto=format&fit=crop&w=900&q=80');"></div>
      </article>
      <article class="gallery-card">
        <div class="gallery-shot" style="background-image: url('https://images.unsplash.com/photo-1519823551278-64ac92734fb1?auto=format&fit=crop&w=900&q=80');"></div>
      </article>
      <article class="gallery-card">
        <div class="gallery-shot" style="background-image: url('https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=900&q=80');"></div>
      </article>
    </section>
  </main>
</body>
</html>
